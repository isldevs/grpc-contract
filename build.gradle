plugins {
    id 'java-library'
    id 'com.google.protobuf' version '0.9.5'
    id 'maven-publish'
}

group = 'com.github.isldevs.grpc'
version = '1.0.0'

repositories {
    mavenCentral()
}

dependencies {

    api 'io.grpc:grpc-stub'
    api 'io.grpc:grpc-protobuf'
    implementation 'io.grpc:grpc-services'

}

protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:4.33.4"
    }
    plugins {
        grpc {
            artifact = "io.grpc:protoc-gen-grpc-java:1.76.0"
        }
    }
    generateProtoTasks {
        all().configureEach {
            plugins {
                grpc {}
            }
        }
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}

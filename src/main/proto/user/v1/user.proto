syntax = "proto3";

package user.v1;

option java_package = "com.isldevs.grpc.user.v1";
option java_multiple_files = true;

service UserService {

  rpc GetUser(GetUserRequest)
      returns (UserResponse);

}

message GetUserRequest {

  int64 id = 1;

}

message UserResponse {

  int64 id = 1;

  string first_name = 2;

  string last_name = 3;

  string email = 4;

}
